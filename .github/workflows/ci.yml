name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-verify:
    name: Build & Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile main and test sources
        run: mvn compile test-compile -q

  smoke-tests:
    name: Smoke Tests (Android Emulator)
    runs-on: ubuntu-latest
    needs: build-verify
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Enable KVM for hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger --name-match=kvm

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium 2 and UiAutomator2 driver
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2
          appium --version

      - name: Download Sauce Labs RN Demo APK
        run: |
          mkdir -p app
          curl -L -o app/MyDemoAppRN.apk \
            "https://github.com/saucelabs/my-demo-app-rn/releases/latest/download/MyDemoAppRN.apk" \
            || echo "APK download failed — app must already be installed on device"

      - name: Start Appium server in background
        run: appium --log target/appium.log &

      - name: Run Smoke Tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: mvn test -Dgroups=smoke -q
        env:
          APP_PATH: app/MyDemoAppRN.apk
          APPIUM_SERVER_URL: http://127.0.0.1:4723
          DEVICE_NAME: emulator-5554

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: target/allure-results/
          retention-days: 30

      - name: Upload Appium log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: appium-log
          path: target/appium.log
          retention-days: 7
